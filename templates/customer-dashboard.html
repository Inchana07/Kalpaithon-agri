<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Customer Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl mb-8 flex items-center gap-6 border border-blue-100">
            <div class="h-20 w-20 bg-blue-600 rounded-full flex items-center justify-center text-white text-3xl font-bold">C</div>
            <div>
                <h1 class="text-2xl font-black text-gray-800">ನಮಸ್ಕಾರ (Hello, Customer!)</h1>
                <p class="text-sm font-bold text-blue-600 uppercase tracking-widest">Premium Member</p>
            </div>
        </div>

        <h3 class="text-xl font-black text-gray-800 mb-4 px-4">ಖರೀದಿ ಇತಿಹಾಸ (Order History)</h3>
        <div class="bg-white p-6 rounded-3xl shadow-md border-l-8 border-blue-500 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-4xl">🥦</span>
                <div>
                    <h4 class="font-bold">Fresh Broccoli</h4>
                    <p class="text-xs text-gray-400 font-bold uppercase">Farmer: Suresh M.</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-blue-600 font-black text-xl">₹85.00</p>
                <span class="text-[10px] bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-black uppercase">Delivered</span>
            </div>
        </div>
    </div>
</body>
</html>
